<!DOCTYPE html>
<html>
<head>
  <title>Config Endpoint Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .box { background: white; padding: 15px; border-radius: 5px; margin: 10px 0; border: 1px solid #ddd; }
    .ok { color: green; font-weight: bold; }
    .err { color: red; font-weight: bold; }
    button { padding: 10px 20px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Config Endpoint Test</h2>
  <button onclick="testConfig()">Test Config Fetch</button>
  
  <div class="box" id="result"></div>
  
  <script>
    async function testConfig() {
      const result = document.getElementById('result');
      result.innerHTML = '⏳ Testing...';
      
      try {
        const configUrl = 'https://ebsjzvjdwljahmrpxkmc.supabase.co/functions/v1/config';
        console.log('Fetching from:', configUrl);
        const resp = await fetch(configUrl, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        
        console.log('Response status:', resp.status);
        const data = await resp.json();
        console.log('Response data:', data);
        
        if (resp.ok && data.success) {
          result.innerHTML = `
            <div class="ok">✓ SUCCESS</div>
            <div>SUPABASE_URL: ${data.supabase_url}</div>
            <div>SUPABASE_ANON_KEY: ${data.supabase_anon_key}</div>
          `;
        } else {
          result.innerHTML = `<div class="err">✗ Config returned false or error</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (e) {
        result.innerHTML = `<div class="err">✗ Fetch Failed</div><div>${e.message}</div>`;
        console.error('Error:', e);
      }
    }
    
    // Auto-test on load
    window.onload = testConfig;
  </script>
</body>
</html>
