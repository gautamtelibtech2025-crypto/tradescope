<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeScope</title>
  <script>
    const target = new URL('./tradescope-frontend.html', window.location.href);
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target.toString());
  </script>
</head>
<body>
  <p>Redirecting to TradeScope...</p>
  <p>If you are not redirected, open <a id="fallback" href="./tradescope-frontend.html">TradeScope frontend</a>.</p>
  <script>
    document.getElementById('fallback').href = target.toString();
  </script>
</body>
</html>
